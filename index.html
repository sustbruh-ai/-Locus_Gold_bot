<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Locus Gold</title>

<script src="https://js.onclckvd.com/in-stream-ad-admanager/tma.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#000;
color:white;
}

.top{
display:flex;
justify-content:space-between;
padding:20px;
font-size:20px;
}

.balance{
font-size:32px;
font-weight:bold;
}

.screen{
display:none;
padding:20px;
}

.active{
display:block;
}

.card{
background:#111;
border-radius:20px;
padding:20px;
margin-bottom:20px;
}

.case{
border:2px solid #333;
border-radius:20px;
padding:20px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.btn{
background:#ff2a2a;
border:none;
padding:12px 25px;
border-radius:20px;
color:white;
font-weight:bold;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
background:#111;
display:flex;
justify-content:space-around;
padding:15px;
}

.tab{
color:#aaa;
}

.tab.active{
color:#ff2a2a;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border-radius:10px;
border:none;
background:#222;
color:white;
}

.exchange{
background:#111;
padding:20px;
border-radius:20px;
text-align:center;
}

</style>
</head>

<body>

<div class="top">
<div>

<div>Вирты</div>
<div class="balance" id="money">0 ₽</div>

</div>

<div>

<div>BLACK COINS</div>
<div class="balance" id="bc">0</div>

</div>
</div>

<!-- ИГРА -->

<div id="game" class="screen active">

<div class="exchange">

<h2>BR</h2>

<p>ОБМЕН 1.000.000 ₽ НА 1 BC</p>

<input id="exchangeInput" placeholder="Сумма ₽">

<button class="btn" onclick="exchange()">ОБМЕН</button>

</div>

</div>

<!-- КЕЙСЫ -->

<div id="cases" class="screen">

<div class="case">

<div>
Кейс Бомж<br>
Награда: 1-10 ₽
</div>

<button class="btn" onclick="openCase(1)">Открыть</button>

</div>

<div class="case">

<div>
Кейс Перекуп<br>
Награда: 10-25 ₽
</div>

<button class="btn" onclick="openCase(2)">3 рекламы</button>

</div>

<div class="case">

<div>
Кейс Бизнес<br>
Награда: 25-50 ₽
</div>

<button class="btn" onclick="openCase(3)">4 рекламы</button>

</div>

<div class="case">

<div>
Кейс Магнат<br>
Награда: 50-150 ₽
</div>

<button class="btn" onclick="openCase(4)">5 реклам</button>

</div>

</div>

<!-- СТАТА -->

<div id="stats" class="screen">

<div class="card">

Всего кейсов<br>
<b id="totalCases">0</b>

</div>

<div class="card">

На обмене<br>
<b id="totalBC">0 BC</b>

</div>

</div>

<!-- ВЫВОД -->

<div id="withdraw" class="screen">

<div class="card">

<input placeholder="Nick_Name">
<input placeholder="Сервер">
<input placeholder="Сумма (от 500 BC)">

<button class="btn">ВЫВЕСТИ</button>

</div>

</div>

<!-- НИЖНЕЕ МЕНЮ -->

<div class="bottom">

<div class="tab active" onclick="openTab('game',this)">⚡</div>
<div class="tab" onclick="openTab('cases',this)">📦</div>
<div class="tab" onclick="openTab('stats',this)">📊</div>
<div class="tab" onclick="openTab('withdraw',this)">💸</div>

</div>

<script>

let money=0
let bc=0
let cases=0

window.initCdTma?.({ id: 'Your Spot ID' })
.then(show => window.show = show)

function ad(){
return window.show?.()
}

function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min
}

async function openCase(type){

let ads=1
let min=1
let max=10

if(type==2){ads=3;min=10;max=25}
if(type==3){ads=4;min=25;max=50}
if(type==4){ads=5;min=50;max=150}

for(let i=0;i<ads;i++){
await ad()
}

let reward=rand(min,max)

money+=reward
cases++

update()

alert("Ты выиграл "+reward+" ₽")

}

function exchange(){

let val=parseInt(exchangeInput.value)

if(val>=1000000){

let give=Math.floor(val/1000000)

bc+=give
money-=give*1000000

}

update()

}

function update(){

moneyEl.innerText=money+" ₽"
bcEl.innerText=bc
totalCases.innerText=cases
totalBC.innerText=bc+" BC"

}

const moneyEl=document.getElementById("money")
const bcEl=document.getElementById("bc")

function openTab(id,el){

document.querySelectorAll(".screen")
.forEach(x=>x.classList.remove("active"))

document.getElementById(id)
.classList.add("active")

document.querySelectorAll(".tab")
.forEach(x=>x.classList.remove("active"))

el.classList.add("active")

}

</script>

</body>
</html>
