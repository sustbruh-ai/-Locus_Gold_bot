<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>LocusGold Cases</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://js.onclckvd.com/in-stream-ad-admanager/tma.js"></script>

<style>

body{
background:#0f1117;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

header{
background:#171a23;
padding:20px;
font-size:28px;
font-weight:bold;
color:#f5b642;
}

.balance{
margin-top:20px;
font-size:22px;
}

.cases{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
padding:30px;
max-width:600px;
margin:auto;
}

.case{
background:#1c2130;
padding:25px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,0.4);
transition:0.2s;
}

.case:hover{
transform:scale(1.05);
}

.case h3{
margin:0;
color:#f5b642;
}

.case p{
font-size:14px;
opacity:0.8;
}

button{
margin-top:10px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#f5b642;
color:black;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#ffd369;
}

.result{
margin-top:20px;
font-size:20px;
}

.loading{
margin-top:10px;
font-size:14px;
opacity:0.7;
}

</style>
</head>

<body>

<header>
🎰 LocusGold Cases
</header>

<div class="balance">
BC: <span id="balance">0</span>
</div>

<div class="cases">

<div class="case">
<h3>Кейс 1</h3>
<p>Награда: 1-10 BC</p>
<p>Цена: 1 реклама</p>
<button onclick="openCase(1)">Открыть</button>
</div>

<div class="case">
<h3>Кейс 2</h3>
<p>Награда: 10-25 BC</p>
<p>Цена: 3 рекламы</p>
<button onclick="openCase(2)">Открыть</button>
</div>

<div class="case">
<h3>Кейс 3</h3>
<p>Награда: 25-50 BC</p>
<p>Цена: 4 рекламы</p>
<button onclick="openCase(3)">Открыть</button>
</div>

<div class="case">
<h3>Кейс 4</h3>
<p>Награда: 50-150 BC</p>
<p>Цена: 5 реклам</p>
<button onclick="openCase(4)">Открыть</button>
</div>

</div>

<div class="loading" id="status"></div>

<div class="result" id="result"></div>

<script>

let BC = 0
let showAd

// запуск рекламы
window.initCdTma?.({ id: '429797' })
.then(show=>{
showAd = show
})
.catch(e=>console.log(e))

function updateBalance(){
document.getElementById("balance").innerText = BC
}

// случайное число
function random(min,max){
return Math.floor(Math.random()*(max-min+1))+min
}

// воспроизведение нескольких реклам
async function playAds(amount){

for(let i=1;i<=amount;i++){

document.getElementById("status").innerText =
"📺 Реклама "+i+" / "+amount

try{
await showAd()
}catch(e){
console.log(e)
return false
}

}

document.getElementById("status").innerText=""
return true

}

// открыть кейс
async function openCase(caseId){

if(!showAd){
alert("Реклама ещё загружается")
return
}

let ads = 0
let min = 0
let max = 0

if(caseId==1){
ads = 1
min = 1
max = 10
}

if(caseId==2){
ads = 3
min = 10
max = 25
}

if(caseId==3){
ads = 4
min = 25
max = 50
}

if(caseId==4){
ads = 5
min = 50
max = 150
}

let watched = await playAds(ads)

if(!watched) return

let reward = random(min,max)

BC += reward

updateBalance()

document.getElementById("result").innerText =
"🎉 Ты выиграл "+reward+" BC!"

}

</script>

</body>
</html>
